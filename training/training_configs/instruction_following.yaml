# Model arguments
model_name_or_path: Qwen/Qwen2.5-7B
torch_dtype: null

# Data training arguments
# For definitions, see: src/h4/training/config.py
dataset_mixer:
  json: 1.0
dataset_splits:
- ../synthesis/sampling_results/qwen25_7b_seed_45_instruction_following_ssss_dpo.jsonl
preprocessing_num_workers: 8

# DPOTrainer arguments
bf16: true
beta: 0.01
do_eval: true
eval_strategy: epoch
gradient_accumulation_steps: 16
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: False
hub_model_id: qwen25_7b_seed_45_instruction_following_ssss
learning_rate: 1.0e-6
log_level: info
logging_steps: 1
lr_scheduler_type: cosine
max_length: 6144
max_prompt_length: 1024
num_train_epochs: 1
optim: adamw_torch
output_dir: outputs/qwen25_7b_seed_45_instruction_following_ssss
per_device_train_batch_size: 1
per_device_eval_batch_size: 2
push_to_hub: false
save_strategy: epoch
save_total_limit: 4
save_only_model: true
seed: 42
warmup_ratio: 0.1
run_name: qwen25_7b_seed_45_instruction_following_ssss
report_to: "wandb"